<script type="text/babel">

const { useState, useEffect, useCallback, useMemo, useRef } = React;

const FONT_DISPLAY = "'Fraunces', Georgia, serif";
const FONT_MONO = "'IBM Plex Mono', monospace";
const C = {
  goldSoft:"#F1E4C2", tealSoft:"#E1EEEC", rustSoft:"#F6E2DA", greenSoft:"#E4EEE0",
  gold:"#B8912E", tealDeep:"#0A2B2C", rust:"#B3492B", green:"#294A29", sub:"#6B6459", line:"#E4DFD3", teal:"#0F3D3E"
};
const uid = () => Math.random().toString(36).slice(2, 9);
const CATEGORIES = ["Chair", "Table", "Sofa", "Other"];
const today = () => new Date().toISOString().slice(0, 10);

function exportCsv(filename, rows) {
  if (!rows.length) return;
  const headers = Object.keys(rows[0]);
  const escape = (v) => `"${String(v??"").replace(/"/g,'""')}"`;
  const csv = [headers.join(","), ...rows.map(r => headers.map(h=>escape(r[h])).join(","))].join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function makeSku(product, v) {
  const p = (product?.code || "GEN").toUpperCase();
  const c = (v.colorCode || "NA").toUpperCase();
  const isChair = product?.category === "Chair";
  const s = isChair ? (v.seatColor || "").toUpperCase() : "";
  const h = isChair ? (v.headrest === "Yes" ? "HR" : "NH") : "";
  const sz = (v.size || "STD").toUpperCase();
  return [p, c, s, h, sz].filter(Boolean).join("-");
}

// Short, easy-to-read identifier: PRODUCTCODE-01, PRODUCTCODE-02, ...
// Numbered per product, so it stays short even though the full SKU (with
// color/seat/headrest/size) can get long. The full SKU is still kept as the
// detailed reference alongside it.
function makeShortCode(product, existingVariants) {
  const p = (product?.code || "GEN").toUpperCase();
  const countForProduct = existingVariants.filter(v => v.productId === product?.id).length;
  const n = countForProduct + 1;
  const padded = n < 100 ? String(n).padStart(2, "0") : String(n);
  return `${p}-${padded}`;
}

/* ---------- Firestore helpers (shared live data, one doc per collection) ---------- */
const DOC = (name) => db.collection("spica_stock").doc(name);
// Shared, lightweight way for any part of the app to report a sync problem —
// the OfflineBanner-adjacent SyncErrorBanner listens for this.
function reportSyncError(message) {
  window.dispatchEvent(new CustomEvent("spica-sync-error", { detail: message }));
}
function useSyncedDoc(name, fallback) {
  const [value, setValue] = useState(fallback);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const unsub = DOC(name).onSnapshot(
      (snap) => {
        setValue(snap.exists ? snap.data().payload : fallback);
        setReady(true);
      },
      (err) => {
        console.error(`Failed to load "${name}":`, err);
        reportSyncError(`Couldn't load ${name} — check your connection and refresh.`);
      }
    );
    return unsub;
  }, [name]);
  const save = useCallback((next) => {
    setValue(next);
    DOC(name).set({ payload: next }).catch((err) => {
      console.error(`Failed to save "${name}":`, err);
      reportSyncError(`Couldn't save your last change to ${name} — check your connection.`);
    });
  }, [name]);
  return [value, save, ready];
}

/* Users collection: one Firestore doc per username, holding { role } */
function useUsers() {
  const [users, setUsers] = useState({});
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const unsub = db.collection("users").onSnapshot(
      async (snap) => {
        if (snap.empty) {
          // first ever run — seed the 3 known accounts so login keeps working
          const batch = db.batch();
          Object.entries(SEED_ROLE_MAP).forEach(([username, role]) => {
            batch.set(db.collection("users").doc(username), { role });
          });
          try { await batch.commit(); } catch (err) { console.error("Failed to seed users:", err); reportSyncError("Couldn't set up default accounts — check your connection."); }
          return;
        }
        const map = {};
        snap.forEach((d) => { map[d.id] = d.data().role; });
        setUsers(map);
        setReady(true);
      },
      (err) => { console.error("Failed to load users:", err); reportSyncError("Couldn't load user list — check your connection."); }
    );
    return unsub;
  }, []);
  return [users, ready];
}

/* ---------- small UI atoms ---------- */
function Badge({ tone, children }) {

}
function Field({ label, children }) {

}
function PencilIcon({ size=15 }) {

// Type-to-search variant picker: type a code/color/product and pick from the
// filtered suggestion list, instead of scrolling a long <select>.
function VariantAutocomplete({ options, productMap, value, onChange, placeholder, width }) {
  const [query, setQuery] = useState("");
  const [open, setOpen] = useState(false);
  const selected = options.find(v => v.id === value);

  useEffect(() => {
    if (selected) setQuery(`${selected.shortCode||"Unnamed variant"}${selected.colorCode?` — ${selected.colorCode}`:""}`);
    else if (!value) setQuery("");
  }, [value]);

  const matches = useMemo(() => {
    const s = query.trim().toLowerCase();
    if (!s) return options.slice(0, 8);
    return options.filter(v => {
      const p = productMap[v.productId];
      return (v.shortCode||"").toLowerCase().includes(s) || (v.colorCode||"").toLowerCase().includes(s) || (p?.name||"").toLowerCase().includes(s);
    }).slice(0, 8);
  }, [query, options, productMap]);

  const pick = (v) => {
    onChange(v.id);
    setQuery(`${v.shortCode||"Unnamed variant"}${v.colorCode?` — ${v.colorCode}`:""}`);
    setOpen(false);
  };

  return (
    <div style={{ position:"relative", width: width||200 }}>
      <input
        value={query}
        placeholder={placeholder||"Type to search…"}
        onChange={e=>{ setQuery(e.target.value); setOpen(true); if (value) onChange(""); }}
        onFocus={()=>setOpen(true)}
        onBlur={()=>setTimeout(()=>setOpen(false), 150)}
        style={{ width:"100%" }}
      />
      {open && matches.length>0 && (
        <div style={{
          position:"absolute", top:"100%", left:0, right:0, marginTop:4, background:"#fff",
          border:`1px solid ${C.line}`, borderRadius:8, boxShadow:"0 8px 24px -8px rgba(10,43,44,0.25)",
          zIndex:100, maxHeight:220, overflowY:"auto"
        }}>
          {matches.map(v => {
            const p = productMap[v.productId];
            return (
              <div key={v.id} onMouseDown={()=>pick(v)} style={{ padding:"8px 12px", cursor:"pointer", borderBottom:`1px solid ${C.line}` }}>
                <div style={{ fontSize:13, fontWeight:600, color:C.tealDeep }}>{v.shortCode||"Unnamed variant"}</div>
                <div style={{ fontSize:11, color:C.sub }}>{p?.name||"—"}{v.colorCode?` · ${v.colorCode}`:""}</div>
              </div>
            );
          })}
        </div>
      )}
      {open && matches.length===0 && (
        <div style={{
          position:"absolute", top:"100%", left:0, right:0, marginTop:4, background:"#fff",
          border:`1px solid ${C.line}`, borderRadius:8, boxShadow:"0 8px 24px -8px rgba(10,43,44,0.25)",
          zIndex:100, padding:"8px 12px", fontSize:12, color:C.sub
        }}>No matches.</div>
      )}
    </div>
  );
}

// Type-to-search product picker, same idea as VariantAutocomplete but for products.
function ProductAutocomplete({ products, value, onChange, placeholder, width, allowAll }) {
  const [query, setQuery] = useState("");
  const [open, setOpen] = useState(false);
  const selected = products.find(p => p.id === value);

  useEffect(() => {
    if (selected) setQuery(selected.name);
    else if (!value) setQuery("");
  }, [value]);

  const matches = useMemo(() => {
    const s = query.trim().toLowerCase();
    const base = !s ? products : products.filter(p => p.name.toLowerCase().includes(s) || (p.code||"").toLowerCase().includes(s));
    return base.slice(0, 8);
  }, [query, products]);

  const pick = (p) => {
    onChange(p ? p.id : "");
    setQuery(p ? p.name : "");
    setOpen(false);
  };

  return (
    <div style={{ position:"relative", width: width||180 }}>
      <input
        value={query}
        placeholder={placeholder||"Type a product…"}
        onChange={e=>{ setQuery(e.target.value); setOpen(true); if (value) onChange(""); }}
        onFocus={()=>setOpen(true)}
        onBlur={()=>setTimeout(()=>setOpen(false), 150)}
        style={{ width:"100%" }}
      />
      {open && (
        <div style={{
          position:"absolute", top:"100%", left:0, right:0, marginTop:4, background:"#fff",
          border:`1px solid ${C.line}`, borderRadius:8, boxShadow:"0 8px 24px -8px rgba(10,43,44,0.25)",
          zIndex:100, maxHeight:220, overflowY:"auto"
        }}>
          {allowAll && (
            <div onMouseDown={()=>pick(null)} style={{ padding:"8px 12px", cursor:"pointer", borderBottom:`1px solid ${C.line}`, fontWeight:600, color:C.tealDeep }}>All products</div>
          )}
          {matches.length===0 && <div style={{ padding:"8px 12px", fontSize:12, color:C.sub }}>No matches.</div>}
          {matches.map(p => (
            <div key={p.id} onMouseDown={()=>pick(p)} style={{ padding:"8px 12px", cursor:"pointer", borderBottom:`1px solid ${C.line}` }}>
              <div style={{ fontSize:13, fontWeight:600, color:C.tealDeep }}>{p.name}</div>
              <div style={{ fontSize:11, color:C.sub }}>{p.code}{p.category?` · ${p.category}`:""}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------- Login screen ---------- */
function Login() {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setError(""); setBusy(true);
    const fakeEmail = `${username.trim().toLowerCase()}@${USER_DOMAIN}`;
    try {
      await auth.signInWithEmailAndPassword(fakeEmail, password);
    } catch (err) {
      setError("Login failed. Check username and password.");
    }
    setBusy(false);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#FAF7F0" }}>
      <form onSubmit={submit} style={{ background:"#fff", border:`1px solid ${C.line}`, borderRadius:12, padding:"32px 36px", width:320 }}>
        <div style={{ fontFamily:FONT_DISPLAY, fontWeight:600, fontSize:22, color:C.tealDeep, marginBottom:2 }}>Spica Modular</div>
        <div style={{ fontSize:12, color:C.gold, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:24 }}>Stock control login</div>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <Field label="Username">
            <input value={username} onChange={(e)=>setUsername(e.target.value)} placeholder="admin" style={{width:"100%"}} />
          </Field>
          <Field label="Password">
            <input type="password" value={password} onChange={(e)=>setPassword(e.target.value)} style={{width:"100%"}} />
          </Field>
          {error && <div style={{ color:C.rust, fontSize:12 }}>{error}</div>}
          <Btn variant="primary" disabled={busy}>{busy ? "Signing in…" : "Sign in"}</Btn>
        </div>
      </form>
    </div>
  );
}

/* ---------- Main App ---------- */
function App({ username, role }) {
  const [tab, setTab] = useState("dashboard");
  const [navOpen, setNavOpen] = useState(false);
  const [products, setProducts, productsReady] = useSyncedDoc("products", []);
  const [variants, setVariants, variantsReady] = useSyncedDoc("variants", []);
  const [stock, setStock, stockReady] = useSyncedDoc("stock", {});
  const [orders, setOrders, ordersReady] = useSyncedDoc("orders", []);
  const [movements, setMovements, movementsReady] = useSyncedDoc("movements", []);
  const [samples, setSamples, samplesReady] = useSyncedDoc("samples", []);
  const [users, usersReady] = useUsers();
  const ready = productsReady && variantsReady && stockReady && ordersReady && movementsReady && samplesReady;

  const perms = {
    isAdmin: role === "admin",
    canEditCatalogue: role === "admin",
    canEditVariants: role === "admin" || role === "warehouse",
    canEditStock: role === "admin" || role === "warehouse",
    canManageOrders: role === "admin" || role === "warehouse",
    canDelete: role === "admin",
    canManageUsers: role === "admin",
    readOnly: role === "sales",
  };

  const productMap = useMemo(() => Object.fromEntries(products.map(p => [p.id, p])), [products]);
  const variantMap = useMemo(() => Object.fromEntries(variants.map(v => [v.id, v])), [variants]);
  const getStock = useCallback((id) => stock[id] || {opening:0,in:0,out:0,blocked:0}, [stock]);
  const available = useCallback((id) => { const s = getStock(id); return (s.opening||0)+(s.in||0)-(s.out||0)-(s.blocked||0); }, [getStock]);

  const setOpening = (id, value) => {
    if (!perms.canEditStock) return;
    setStock({ ...stock, [id]: { ...(stock[id]||{opening:0,in:0,out:0,blocked:0}), opening: Number(value)||0 } });
  };

  // Logs a dated in/out movement AND updates the running total — this is what
  // powers the day-by-day report.
  const logMovement = (variantId, type, qty, date, note) => {
    if (!perms.canEditStock || !variantId || !qty) return;
    const q = Number(qty);
    if (q <= 0) return;
    const entry = { id: uid(), variantId, type, qty: q, date: date || today(), note: note||"", loggedBy: username, ts: Date.now() };
    setMovements([entry, ...movements]);
    const cur = stock[variantId] || { opening:0, in:0, out:0, blocked:0 };
    setStock({ ...stock, [variantId]: { ...cur, [type]: (cur[type]||0) + q } });
  };

  if (!ready) return <div style={{padding:40}}>Loading…</div>;

  const totalAvailable = variants.reduce((s,v)=>s+available(v.id),0);
  const totalBlocked = variants.reduce((s,v)=>s+(getStock(v.id).blocked||0),0);
  const lowStock = variants.filter(v => available(v.id) <= 5 && available(v.id) >= 0);
  const negativeStock = variants.filter(v => available(v.id) < 0);

  const tabs = [
    { id:"dashboard", label:"Dashboard", icon:"ti-layout-dashboard" },
    { id:"products", label:"Products", icon:"ti-armchair" },
    { id:"variants", label:"Variants", icon:"ti-palette" },
    { id:"stock", label:"Stock ledger", icon:"ti-clipboard-list" },
    { id:"orders", label:"Orders & blocking", icon:"ti-lock" },

  return (
    <div style={{ minHeight:"100vh" }}>

            <div>
              <div style={{ fontFamily:FONT_DISPLAY, fontWeight:600, fontSize:19, color:"#fff", lineHeight:1.1 }}>Spica Modular</div>
              <div style={{ fontSize:11, color:C.gold, letterSpacing:"0.06em", textTransform:"uppercase", marginTop:2 }}>Stock control</div>

            <button onClick={()=>setNavOpen(false)} className="sidebar-close-btn" style={{ display:"none", background:"transparent", border:"none", color:"#fff", padding:4 }}>

        <div className="main-content">
          {tab==="dashboard" && <Dashboard products={products} variants={variants} orders={orders} movements={movements} samples={samples} available={available} totalAvailable={totalAvailable} totalBlocked={totalBlocked} lowStock={lowStock} negativeStock={negativeStock} productMap={productMap} setTab={setTab} />}
          {tab==="products" && <Products products={products} setProducts={setProducts} variants={variants} setVariants={setVariants} stock={stock} setStock={setStock} samples={samples} setSamples={setSamples} perms={perms} />}
          {tab==="variants" && <Variants products={products} variants={variants} setVariants={setVariants} stock={stock} setStock={setStock} perms={perms} />}

          {tab==="orders" && <Orders variants={variants} variantMap={variantMap} productMap={productMap} orders={orders} setOrders={setOrders} stock={stock} setStock={setStock} available={available} perms={perms} />}

function StatCard({ label, value, tone, icon }) {
  const toneColor = {teal:C.tealDeep,gold:"#6B5310",rust:"#7A2D18",green:C.green}[tone]||C.tealDeep;
  const toneBg = {teal:C.tealSoft,gold:C.goldSoft,rust:C.rustSoft,green:C.greenSoft}[tone]||C.tealSoft;
  const toneAccent = {teal:C.teal,gold:C.gold,rust:C.rust,green:"#3F6B3F"}[tone]||C.teal;
  return (
    <div className="stat-card" style={{ background:"#fff", flex:1, minWidth:150 }}>
      <div style={{ height:3, background:toneAccent }} />
      <div style={{ padding:"16px 18px" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ fontSize:11, fontWeight:600, color:C.sub, opacity:.85, textTransform:"uppercase", letterSpacing:"0.05em" }}>{label}</div>
          {icon && (
            <div style={{ width:26, height:26, borderRadius:7, background:toneBg, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <i className={`ti ${icon}`} style={{ fontSize:14, color:toneColor }} aria-hidden="true"></i>
            </div>
          )}
        </div>
        <div style={{ fontFamily:FONT_DISPLAY, fontSize:30, fontWeight:600, color:C.tealDeep, marginTop:6 }}>{value}</div>
      </div>
    </div>
  );
}

function Dashboard({ products, variants, orders, movements, samples, available, totalAvailable, totalBlocked, lowStock, negativeStock, productMap, setTab }) {
  const [q, setQ] = useState("");
  const todayStr = today();
  const todayMoves = movements.filter(m => m.date === todayStr);
  const todayInMoves = todayMoves.filter(m=>m.type==="in");
  const todayOutMoves = todayMoves.filter(m=>m.type==="out");
  const todayIn = todayInMoves.reduce((s,m)=>s+m.qty,0);
  const todayOut = todayOutMoves.reduce((s,m)=>s+m.qty,0);

  const searchResults = q.trim() ? variants.filter(v => {
    const s = q.trim().toLowerCase();
    const p = productMap[v.productId];
    return (v.shortCode||"").toLowerCase().includes(s) || (p?.name||"").toLowerCase().includes(s) || (v.colorCode||"").toLowerCase().includes(s) || (v.remark||"").toLowerCase().includes(s) || (p?.remark||"").toLowerCase().includes(s);
  }).slice(0, 8) : [];

  const openOrders = orders.filter(o=>o.status!=="CONFIRMED"&&o.status!=="CANCELLED").length;
  const dateLabel = new Date().toLocaleDateString("en-IN", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
  const samplesWithClient = samples.filter(sm=>sm.status==="with_client").length;

    <div>
      <div style={{
        borderRadius:14, padding:"22px 26px", marginBottom:22, position:"relative", overflow:"hidden",

        boxShadow:"0 10px 30px -14px rgba(10,43,44,0.45)"

          <div style={{ fontFamily:FONT_DISPLAY, fontWeight:600, fontSize:26, color:"#fff" }}>Today's stock position</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.72)", marginTop:6 }}>
            {totalAvailable} units available across {variants.length} variants · {openOrders} open order{openOrders===1?"":"s"}
          </div>
        </div>
      </div>

      <div className="card" style={{ padding:16, marginBottom:20 }}>
        <div style={{ fontSize:12, fontWeight:600, color:C.tealDeep, marginBottom:10, textTransform:"uppercase", letterSpacing:"0.04em" }}>Quick stock check</div>
        <SearchBox value={q} onChange={setQ} placeholder="Type a code, product, or color…" />
        {q.trim() && (
          <div style={{ marginTop:12 }}>
            {searchResults.length===0 && <div style={{ fontSize:13, color:C.sub }}>No matching item found.</div>}
            {searchResults.map(v => {
              const avail = available(v.id);
              const p = productMap[v.productId];
              const remarkText = [v.remark, p?.remark].filter(Boolean).join(" · ");
              const details = [
                v.colorCode ? `Color: ${v.colorCode}` : null,
                v.size ? `Size: ${v.size}` : null,
                p?.category==="Chair" && v.seatColor ? `Seat: ${v.seatColor}` : null,
                p?.category==="Chair" ? `Headrest: ${v.headrest==="Yes"?"Yes":"No"}` : null,
              ].filter(Boolean).join(" · ");
              return (
                <div key={v.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:`1px solid ${C.line}`, fontSize:13, gap:12 }}>
                  <div>
                    <div style={{ fontWeight:600, color:C.tealDeep }}>
                      {p?.name||"—"} <span style={{ fontFamily:FONT_MONO, fontSize:11, fontWeight:600, color:C.sub, marginLeft:6 }}>{v.shortCode||"—"}</span>
                    </div>
                    {details && <div style={{ color:C.sub, fontSize:12, marginTop:2 }}>{details}</div>}
                    {remarkText && <div style={{ color:C.rust, fontSize:12, marginTop:2, fontWeight:600 }}><i className="ti ti-alert-triangle" style={{verticalAlign:-2,marginRight:3}}></i>{remarkText}</div>}
                  </div>
                  <div style={{ textAlign:"right", flexShrink:0 }}>
                    <div style={{ fontFamily:FONT_MONO, fontWeight:700, fontSize:16, color: avail<0?C.rust:C.tealDeep }}>{avail}</div>
                    <div style={{ fontSize:11, color:C.sub }}>available</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(150px, 1fr))", gap:14, marginBottom:28 }}>
        <StatCard label="Products" value={products.length} tone="teal" icon="ti-armchair" />
        <StatCard label="Variants" value={variants.length} tone="teal" icon="ti-palette" />
        <StatCard label="Available units" value={totalAvailable} tone="green" icon="ti-package" />
        <StatCard label="Blocked units" value={totalBlocked} tone="gold" icon="ti-lock" />
        <StatCard label="Today's inward" value={todayIn} tone="green" icon="ti-arrow-down-left" />
        <StatCard label="Today's outward" value={todayOut} tone="rust" icon="ti-arrow-up-right" />
        <StatCard label="Open orders" value={openOrders} tone="rust" icon="ti-clipboard-list" />
      </div>

      <div className="card" style={{ padding:"18px 20px", marginBottom:24, display:"flex", alignItems:"center", justifyContent:"space-between", gap:16, flexWrap:"wrap", background:`linear-gradient(120deg, ${C.tealSoft} 0%, #fff 60%)` }}>
        <div style={{ display:"flex", alignItems:"center", gap:14 }}>
          <div style={{ width:40, height:40, borderRadius:10, background:C.tealDeep, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            <i className="ti ti-package-export" style={{ fontSize:20, color:C.gold }} aria-hidden="true"></i>
          </div>
          <div>
            <div style={{ fontFamily:FONT_DISPLAY, fontSize:15, fontWeight:600, color:C.tealDeep }}>Mockup samples</div>
            <div style={{ fontSize:12, color:C.sub, marginTop:2 }}>
              {samplesWithClient} sample{samplesWithClient===1?"":"s"} currently with clients
              {samplesOverdue>0 && <span style={{ color:C.rust, fontWeight:600 }}> · {samplesOverdue} overdue</span>}
            </div>
          </div>
        </div>
        <Btn variant="ghost" onClick={()=>setTab && setTab("mockup")}>Open Mockup<i className="ti ti-arrow-right" style={{verticalAlign:-2,marginLeft:6}}></i></Btn>
      </div>

      <div style={{ display:"flex", gap:24, flexWrap:"wrap", marginBottom:24 }}>
        <div style={{ flex:1, minWidth:320 }} className="card">
          <div style={{ padding:18 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:26, height:26, borderRadius:7, background:C.greenSoft, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <i className="ti ti-arrow-down-left" style={{ fontSize:14, color:C.green }} aria-hidden="true"></i>
                </div>
                <div style={{ fontFamily:FONT_DISPLAY, fontSize:16, fontWeight:600, color:C.tealDeep }}>Today's inward</div>
              </div>
              <Badge tone="green">Total +{todayIn}</Badge>
            </div>
            {todayInMoves.length===0 && <div style={{ fontSize:13, color:C.sub }}>No inward stock logged today.</div>}
            {todayInMoves.map(m => {
              const v = variants.find(x=>x.id===m.variantId);
              return (
                <div key={m.id} style={{ padding:"8px 0", borderBottom:`1px solid ${C.line}`, fontSize:13 }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <span>{productMap[v?.productId]?.name||"—"} <span style={{ color:C.sub, fontFamily:FONT_MONO, fontSize:12 }}>{v?.shortCode||"—"}</span></span>
                    <Badge tone="green">+{m.qty}</Badge>
                  </div>
                  <div style={{ color:C.sub, fontSize:12, marginTop:3 }}>
                    {m.note ? `${m.note} · ` : ""}{m.loggedBy ? `logged by ${m.loggedBy}` : ""}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div style={{ flex:1, minWidth:320 }} className="card">
          <div style={{ padding:18 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:26, height:26, borderRadius:7, background:C.rustSoft, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <i className="ti ti-arrow-up-right" style={{ fontSize:14, color:C.rust }} aria-hidden="true"></i>
                </div>
                <div style={{ fontFamily:FONT_DISPLAY, fontSize:16, fontWeight:600, color:C.tealDeep }}>Today's outward</div>
              </div>
              <Badge tone="rust">Total -{todayOut}</Badge>
            </div>
            {todayOutMoves.length===0 && <div style={{ fontSize:13, color:C.sub }}>No outward stock logged today.</div>}
            {todayOutMoves.map(m => {
              const v = variants.find(x=>x.id===m.variantId);
              return (
                <div key={m.id} style={{ padding:"8px 0", borderBottom:`1px solid ${C.line}`, fontSize:13 }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <span>{productMap[v?.productId]?.name||"—"} <span style={{ color:C.sub, fontFamily:FONT_MONO, fontSize:12 }}>{v?.shortCode||"—"}</span></span>
                    <Badge tone="rust">-{m.qty}</Badge>
                  </div>
                  <div style={{ color:C.sub, fontSize:12, marginTop:3 }}>
                    {m.note ? `${m.note} · ` : ""}{m.loggedBy ? `logged by ${m.loggedBy}` : ""}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{ display:"flex", gap:24, flexWrap:"wrap" }}>
        <div style={{ flex:1, minWidth:300 }} className="card">
          <div style={{ padding:18 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
              <div style={{ width:26, height:26, borderRadius:7, background:C.goldSoft, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <i className="ti ti-alert-triangle" style={{ fontSize:14, color:"#6B5310" }} aria-hidden="true"></i>
              </div>
              <div style={{ fontFamily:FONT_DISPLAY, fontSize:16, fontWeight:600, color:C.tealDeep }}>Low stock (5 or fewer)</div>
            </div>
            {lowStock.length===0 && <div style={{ fontSize:13, color:C.sub }}>Nothing running low right now.</div>}
            {lowStock.slice(0,8).map(v => (
              <div key={v.id} style={{ display:"flex", justifyContent:"space-between", padding:"7px 0", borderBottom:`1px solid ${C.line}`, fontSize:13 }}>
                <span>{productMap[v.productId]?.name||"—"} <span style={{ color:C.sub, fontFamily:FONT_MONO, fontSize:12 }}>{v.shortCode||"—"}</span></span>

                <i className="ti ti-alert-circle" style={{ fontSize:14, color:C.rust }} aria-hidden="true"></i>

                <span>{productMap[v.productId]?.name||"—"} <span style={{ color:C.sub, fontFamily:FONT_MONO, fontSize:12 }}>{v.shortCode||"—"}</span></span>
                <Badge tone="rust">Over-blocked</Badge>

            ))}

function Mockup({ products, variants, variantMap, productMap, samples, setSamples, perms, setTab }) {
  const [customer, setCustomer] = useState("");
  const [productId, setProductId] = useState("");
  const [color, setColor] = useState("");
  const [customColor, setCustomColor] = useState(false);
  const [qty, setQty] = useState(1);
  const [dateSent, setDateSent] = useState(today());
  const [expectedReturn, setExpectedReturn] = useState("");
  const [note, setNote] = useState("");
  const [q, setQ] = useState("");
  const todayStr = today();

  // Colors already used as variants for the selected product, so the person
  // sending the sample can pick from known colors instead of retyping them.
  const knownColors = useMemo(() => {
    if (!productId) return [];
    const set = new Set(variants.filter(v=>v.productId===productId).map(v=>v.colorCode).filter(Boolean));
    return [...set];
  }, [variants, productId]);

  const addSample = () => {
    if (!perms.canManageOrders || !customer.trim() || !productId || !color.trim() || !qty) return;
    const s = { id:uid(), customer:customer.trim(), productId, color:color.trim(), qty:Number(qty), dateSent, expectedReturn, note:note.trim(), status:"with_client", ts:Date.now() };
    setSamples([s, ...samples]);
    setCustomer(""); setProductId(""); setColor(""); setCustomColor(false); setQty(1); setExpectedReturn(""); setNote("");
  };

  const setStatus = (id, status) => {
    if (!perms.canManageOrders) return;
    setSamples(samples.map(s => s.id===id ? { ...s, status } : s));
  };

  const removeSample = (id) => { if (!perms.canDelete) return; if (!window.confirm("Delete this sample record? This can't be undone.")) return; setSamples(samples.filter(s=>s.id!==id)); };

  const filtered = samples.filter(s => {
    if (!q.trim()) return true;
    const term = q.trim().toLowerCase();
    const p = productMap[s.productId];
    return s.customer.toLowerCase().includes(term) || (p?.name||"").toLowerCase().includes(term) || (s.color||"").toLowerCase().includes(term);
  });

  const statusBadge = (s) => {
    if (s.status === "with_client") {
      const overdue = s.expectedReturn && s.expectedReturn < todayStr;
      return overdue ? <Badge tone="rust">Overdue</Badge> : <Badge tone="gold">With client</Badge>;
    }
    if (s.status === "returned") return <Badge tone="sub">Returned</Badge>;
    if (s.status === "ordered") return <Badge tone="green">Liked it — Ordered</Badge>;
    return null;
  };

  return (
    <div>
      <SectionHeader eyebrow="Fulfilment" title="Mockup samples" action={<SearchBox value={q} onChange={setQ} placeholder="Search customer, product, or color…" />} />
      <div className="card" style={{ padding:"14px 18px", marginBottom:20, display:"flex", alignItems:"center", gap:12, background:C.tealSoft }}>
        <i className="ti ti-info-circle" style={{ fontSize:18, color:C.tealDeep }} aria-hidden="true"></i>
        <div style={{ fontSize:13, color:C.tealDeep }}>Track samples sent to clients — once they try it, mark it returned or, if they liked it, mark it as ordered.</div>
      </div>

      {perms.canManageOrders && (
        <div className="card" style={{ padding:16, marginBottom:20 }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.tealDeep, marginBottom:10, textTransform:"uppercase", letterSpacing:"0.04em" }}>Send a new sample</div>
          <div style={{ display:"flex", gap:10, alignItems:"flex-end", flexWrap:"wrap" }}>
            <Field label="Customer"><input style={{width:170}} value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="Customer name" /></Field>
            <Field label="Product">
              <ProductAutocomplete products={products} value={productId} onChange={val=>{ setProductId(val); setColor(""); setCustomColor(false); }} placeholder="Type a product…" width={190} />
            </Field>
            <Field label="Color">
              {knownColors.length>0 && !customColor ? (
                <select style={{width:150}} value={color} onChange={e=>{ if (e.target.value==="__other__") { setCustomColor(true); setColor(""); } else { setColor(e.target.value); } }}>
                  <option value="">Select</option>
                  {knownColors.map(c=><option key={c} value={c}>{c}</option>)}
                  <option value="__other__">Other…</option>
                </select>
              ) : (
                <input style={{width:150}} value={color} onChange={e=>setColor(e.target.value)} placeholder="Color code" disabled={!productId} autoFocus={customColor} />
              )}
            </Field>
            <Field label="Qty"><input type="number" min="1" style={{width:70}} value={qty} onChange={e=>setQty(e.target.value)} /></Field>
            <Field label="Sent on"><input type="date" style={{width:150}} value={dateSent} onChange={e=>setDateSent(e.target.value)} /></Field>
            <Field label="Expected return"><input type="date" style={{width:150}} value={expectedReturn} onChange={e=>setExpectedReturn(e.target.value)} /></Field>
            <Field label="Note"><input style={{width:160}} value={note} onChange={e=>setNote(e.target.value)} placeholder="Optional" /></Field>
            <Btn variant="primary" onClick={addSample}><i className="ti ti-send" style={{verticalAlign:-2,marginRight:4}}></i>Send sample</Btn>
          </div>
        </div>
      )}

      <div className="card">
        <table>
          <thead><tr style={{background:C.tealSoft}}><th>Customer</th><th>Product</th><th>Color</th><th style={{textAlign:"right"}}>Qty</th><th>Sent</th><th>Expected return</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {filtered.length===0 && <tr><td colSpan={8} style={{padding:18,color:C.sub,textAlign:"center"}}>{samples.length===0 ? "No samples sent yet." : "No samples match your search."}</td></tr>}
            {filtered.map(s => {
              const p = productMap[s.productId];
              const overdue = s.status==="with_client" && s.expectedReturn && s.expectedReturn < todayStr;
              return (
                <tr key={s.id} style={{borderTop:`1px solid ${C.line}`, borderLeft: overdue?`3px dashed ${C.rust}`:"3px solid transparent"}}>
                  <td>{s.customer}</td>
                  <td>{p?.name||"—"}</td>
                  <td style={{fontFamily:FONT_MONO,fontSize:12,fontWeight:600}}>{s.color||"—"}</td>
                  <td style={{textAlign:"right"}}>{s.qty}</td>
                  <td>{s.dateSent}</td>
                  <td>{s.expectedReturn||"—"}</td>
                  <td>{statusBadge(s)}</td>
                  <td style={{textAlign:"right", whiteSpace:"nowrap"}}>
                    {perms.canManageOrders && s.status==="with_client" && (
                      <>
                        <Btn variant="ghost" onClick={()=>setStatus(s.id,"returned")} style={{marginRight:6}}>Mark returned</Btn>
                        <Btn variant="primary" onClick={()=>setStatus(s.id,"ordered")} style={{marginRight:6}}>Liked it — Order</Btn>
                      </>
                    )}
                    {perms.canDelete && <Btn variant="danger" onClick={()=>removeSample(s.id)}><TrashIcon /></Btn>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{fontSize:12,color:C.sub,marginTop:10}}>"Liked it — Order" just flags the sample as converted. Log the actual order and stock movement in the Orders tab.</div>
    </div>
  );
}

function Products({ products, setProducts, variants, setVariants, stock, setStock, samples, setSamples, perms }) {
  const [name, setName] = useState(""); const [code, setCode] = useState(""); const [category, setCategory] = useState("Chair");
  const [remark, setRemark] = useState("");
  const [q, setQ] = useState("");
  const [importMsg, setImportMsg] = useState("");
  const [selected, setSelected] = useState(() => new Set());
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const fileInputRef = useRef(null);
  const add = () => {
    if (!perms.canEditCatalogue || !name.trim() || !code.trim()) return;
    setProducts([...products, { id:uid(), name:name.trim(), code:code.trim().toUpperCase(), category, remark:remark.trim() }]);
    setName(""); setCode(""); setRemark("");
  };
  const canEditRow = perms.isAdmin || perms.canEditVariants; // admin: full edit, warehouse: remark only
  const startEdit = (p) => {
    if (!canEditRow) return;
    setEditingId(p.id);
    setEditForm({ name:p.name, code:p.code, category:p.category||"Other", remark:p.remark||"" });
  };
  const cancelEdit = () => { setEditingId(null); setEditForm({}); };
  const saveEdit = (id) => {
    if (!window.confirm("Save changes to this product?")) return;
    setProducts(products.map(p => {
      if (p.id !== id) return p;
      if (perms.isAdmin) {
        return { ...p, name:(editForm.name||"").trim()||p.name, code:(editForm.code||"").trim().toUpperCase()||p.code, category:editForm.category||p.category, remark:(editForm.remark||"").trim() };
      }
      // warehouse: remark only, everything else stays untouched
      return { ...p, remark:(editForm.remark||"").trim() };
    }));
    setEditingId(null); setEditForm({});
  };
  const remove = (id) => { if (!perms.canDelete) return; if (!window.confirm("Delete this product? Its variants and stock history will stay, but the product itself will be removed.")) return; setProducts(products.filter(x=>x.id!==id)); };
  const toggleSelect = (id) => setSelected(prev => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; });
  const toggleSelectAll = (rows) => setSelected(prev => {
    const allSelected = rows.length>0 && rows.every(p=>prev.has(p.id));
    if (allSelected) return new Set();
    return new Set(rows.map(p=>p.id));
  });
  const bulkRemove = () => {
    if (!perms.canDelete || selected.size===0) return;
    if (!window.confirm(`Delete ${selected.size} selected product${selected.size===1?"":"s"}? Their variants and stock history will stay, but the products themselves will be removed.`)) return;
    setProducts(products.filter(p=>!selected.has(p.id)));
    setSelected(new Set());
  };

  // Very small CSV parser — handles quoted fields with commas, no external lib needed.
  const parseCsv = (text) => {
    const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
    return lines.map(line => {
      const cells = []; let cur = ""; let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === "," && !inQuotes) { cells.push(cur); cur = ""; }
        else { cur += ch; }
      }
      cells.push(cur);
      return cells.map(c => c.trim().replace(/^"|"$/g, ""));
    });
  };

  const downloadTemplate = () => {
    const csv = "Product name,Product code,Category,Colour code,Size,Available stock\nSofa 3-seater,SFA,Sofa,XP-01-FP9817,6x3 ft,10\nDining Chair,CHR,Chair,Black,Standard,25\n";
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "products_template.csv"; a.click();
    URL.revokeObjectURL(url);
  };

  // Finds a header column by trying a few likely names (case-insensitive, ignores spaces/underscores).
  const findCol = (header, candidates) => {
    const norm = (s) => s.toLowerCase().replace(/[\s_]+/g, " ").trim();
    const normHeader = header.map(norm);
    for (const c of candidates) {
      const idx = normHeader.indexOf(norm(c));
      if (idx > -1) return idx;
    }
    return -1;
  };

  const handleImportFile = (e) => {
    const file = e.target.files[0];
    if (!file || !perms.isAdmin) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const rows = parseCsv(String(ev.target.result));
      if (rows.length < 2) { setImportMsg("File looks empty — nothing to import."); return; }
      const header = rows[0];
      const nameIdx = findCol(header, ["product name", "name", "product"]);
      const codeIdx = findCol(header, ["product code", "code"]);
      const catIdx = findCol(header, ["category"]);
      const colorIdx = findCol(header, ["colour code", "color code", "colour", "color"]);
      const sizeIdx = findCol(header, ["size"]);
      const availIdx = findCol(header, ["available stock", "available", "stock", "quantity", "qty"]);
      if (nameIdx === -1 || codeIdx === -1) {
        setImportMsg('CSV needs "Product name" and "Product code" columns (header row).');
        return;
      }

      // Work on local copies so codes/variants added mid-file are recognised by later rows.
      const nextProducts = [...products];
      const nextVariants = [...variants];
      const nextStock = { ...stock };
      const productByCode = new Map(nextProducts.map(p => [p.code.toUpperCase(), p]));
      let productsAdded = 0, variantsAdded = 0, variantsUpdated = 0;

      rows.slice(1).forEach(r => {
        const nm = (r[nameIdx] || "").trim();
        const cd = (r[codeIdx] || "").trim().toUpperCase();
        if (!nm || !cd) return;
        const colorCode = colorIdx > -1 ? (r[colorIdx] || "").trim() : "";
        const size = sizeIdx > -1 ? (r[sizeIdx] || "").trim() : "";
        const availStock = availIdx > -1 ? Number(r[availIdx]) || 0 : 0;
        let cat = catIdx > -1 ? (r[catIdx] || "").trim() : "Other";
        if (!CATEGORIES.includes(cat)) cat = "Other";

        // Reuse the product if the code already exists (in Firestore or earlier in this file), else create it.
        let product = productByCode.get(cd);
        if (!product) {
          product = { id: uid(), name: nm, code: cd, category: cat };
          nextProducts.push(product);
          productByCode.set(cd, product);
          productsAdded++;
        }

        if (!colorCode && !size) return; // no variant info on this row — product-only row

        // Match an existing variant by product + colour code + size.
        const existing = nextVariants.find(v => v.productId === product.id && (v.colorCode||"").toLowerCase() === colorCode.toLowerCase() && (v.size||"").toLowerCase() === size.toLowerCase());
        if (existing) {
          // Update opening stock so "available" comes out to the value given, without
          // touching any in/out/blocked history that already built up on this variant.
          const s = nextStock[existing.id] || { opening:0, in:0, out:0, blocked:0 };
          const newOpening = availStock - (s.in||0) + (s.out||0) + (s.blocked||0);
          nextStock[existing.id] = { ...s, opening: newOpening };
          variantsUpdated++;
        } else {
          const v = { id: uid(), productId: product.id, colorCode, seatColor: "", headrest: "No", size };
          v.sku = makeSku(product, v);
          v.shortCode = makeShortCode(product, nextVariants);
          nextVariants.push(v);
          nextStock[v.id] = { opening: availStock, in: 0, out: 0, blocked: 0 };
          variantsAdded++;
        }
      });

      if (productsAdded > 0) setProducts(nextProducts);
      if (variantsAdded > 0 || variantsUpdated > 0) { setVariants(nextVariants); setStock(nextStock); }

      const parts = [`${productsAdded} new product${productsAdded===1?"":"s"}`, `${variantsAdded} new variant${variantsAdded===1?"":"s"}`];
      if (variantsUpdated > 0) parts.push(`${variantsUpdated} existing variant${variantsUpdated===1?"":"s"} updated to the given available stock`);
      setImportMsg(`Imported: ${parts.join(", ")}.`);
    };
    reader.readAsText(file);
    e.target.value = "";
  };


  const filtered = products.filter(p => {
    const s = q.trim().toLowerCase();
    if (!s) return true;
    return p.name.toLowerCase().includes(s) || p.code.toLowerCase().includes(s) || (p.category||"").toLowerCase().includes(s) || (p.remark||"").toLowerCase().includes(s);
  });

  return (
    <div>
      <SectionHeader eyebrow="Catalogue" title="Products" action={<SearchBox value={q} onChange={setQ} placeholder="Search name, code, remark…" />} />
      {perms.canEditCatalogue && (
        <div style={{ display:"flex", gap:10, marginBottom:20, alignItems:"flex-end", flexWrap:"wrap" }}>
          <Field label="Product name"><input style={{width:220}} value={name} onChange={e=>setName(e.target.value)} placeholder="Sofa 3-seater" /></Field>
          <Field label="Product code"><input style={{width:140}} value={code} onChange={e=>setCode(e.target.value)} placeholder="SFA" /></Field>
          <Field label="Category">
            <select style={{width:130}} value={category} onChange={e=>setCategory(e.target.value)}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select>
          </Field>
          <Field label="Remark"><input style={{width:180}} value={remark} onChange={e=>setRemark(e.target.value)} placeholder="e.g. 2 units damaged" /></Field>
          <Btn variant="primary" onClick={add}><i className="ti ti-plus" style={{verticalAlign:-2,marginRight:4}}></i>Add product</Btn>
        </div>
      )}
      {perms.isAdmin && (
        <div className="card" style={{ padding:16, marginBottom:20 }}>
          <div style={{ fontSize:12, fontWeight:600, color:C.tealDeep, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.04em" }}>Bulk import (Admin only)</div>
          <div style={{ fontSize:12, color:C.sub, marginBottom:10 }}>Upload a CSV with <code>Product name</code>, <code>Product code</code>, <code>Category</code>, <code>Colour code</code>, <code>Size</code>, <code>Available stock</code> columns. One row = one variant. Existing product codes are reused (not duplicated) — <code>Category</code> must be Chair, Table, Sofa, or Other; anything else (or blank) becomes Other, and it's only applied when creating a new product. If a product + colour + size combo already exists, its stock is updated to match the value you give — otherwise a new variant is created.</div>
          <div style={{ display:"flex", gap:10, alignItems:"center", flexWrap:"wrap" }}>
            <Btn variant="ghost" onClick={downloadTemplate}><i className="ti ti-download" style={{verticalAlign:-2,marginRight:4}}></i>Download template</Btn>
            <Btn variant="primary" onClick={()=>fileInputRef.current && fileInputRef.current.click()}><i className="ti ti-upload" style={{verticalAlign:-2,marginRight:4}}></i>Import CSV</Btn>
            <input ref={fileInputRef} type="file" accept=".csv" onChange={handleImportFile} style={{ display:"none" }} />
          </div>
          {importMsg && <div style={{ fontSize:12, color:C.tealDeep, marginTop:10 }}>{importMsg}</div>}
        </div>
      )}
      {!perms.canEditCatalogue && perms.canEditVariants && (
        <div style={{ fontSize:12, color:C.sub, marginBottom:14 }}>Only admin can add, remove, or change product details. You can edit the Remark column using the pencil icon.</div>
      )}
      {perms.readOnly && (
        <div style={{ fontSize:12, color:C.sub, marginBottom:14 }}>Only admin can add or remove products. You can still view the catalogue.</div>
      )}
      <div className="card">
        {perms.canDelete && selected.size>0 && (
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", background:C.rustSoft, borderBottom:`1px solid ${C.line}` }}>
            <span style={{ fontSize:12, color:C.tealDeep, fontWeight:600 }}>{selected.size} selected</span>
            <Btn variant="danger" onClick={bulkRemove}><span style={{marginRight:6}}><TrashIcon /></span>Delete selected</Btn>
          </div>
        )}
        <table>
          <thead><tr style={{background:C.tealSoft}}>
            {perms.canDelete && <th style={{width:36}}><input type="checkbox" checked={filtered.length>0 && filtered.every(p=>selected.has(p.id))} onChange={()=>toggleSelectAll(filtered)} /></th>}
            <th>Product</th><th>Code</th><th>Category</th><th>Variants</th><th>Remark</th><th></th></tr></thead>
          <tbody>
            {filtered.length===0 && <tr><td colSpan={perms.canDelete?7:6} style={{padding:18,color:C.sub,textAlign:"center"}}>{products.length===0 ? "No products yet." : "No products match your search."}</td></tr>}
            {filtered.map(p => {
              const editing = editingId === p.id;
              return (
              <tr key={p.id} style={{borderTop:`1px solid ${C.line}`, borderLeft: p.remark?`3px dashed ${C.rust}`:"3px solid transparent", background: editing?C.tealSoft:"transparent"}}>
                {perms.canDelete && <td><input type="checkbox" checked={selected.has(p.id)} onChange={()=>toggleSelect(p.id)} /></td>}
                <td>{editing && perms.isAdmin ? <input style={{width:150,fontSize:12}} value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} /> : p.name}</td>
                <td style={{fontFamily:FONT_MONO}}>{editing && perms.isAdmin ? <input style={{width:100,fontSize:12}} value={editForm.code} onChange={e=>setEditForm({...editForm,code:e.target.value})} /> : p.code}</td>
                <td>
                  {editing && perms.isAdmin ? (
                    <select style={{width:110,fontSize:12}} value={editForm.category} onChange={e=>setEditForm({...editForm,category:e.target.value})}>{CATEGORIES.map(c=><option key={c}>{c}</option>)}</select>
                  ) : <Badge tone="teal">{p.category||"Other"}</Badge>}
                </td>
                <td>{variants.filter(v=>v.productId===p.id).length}</td>
                <td>
                  {editing ? (
                    <input style={{width:160, fontSize:12}} value={editForm.remark} onChange={e=>setEditForm({...editForm,remark:e.target.value})} placeholder="e.g. 2 units damaged" autoFocus={!perms.isAdmin} />
                  ) : (p.remark ? <span style={{fontSize:12,color:C.rust}}>{p.remark}</span> : "—")}
                </td>
                <td style={{textAlign:"right", whiteSpace:"nowrap"}}>
                  {editing ? (
                    <>
                      <Btn variant="primary" onClick={()=>saveEdit(p.id)} style={{marginRight:6}}><i className="ti ti-check" style={{verticalAlign:-2}}></i></Btn>
                      <Btn variant="ghost" onClick={cancelEdit}><i className="ti ti-x" style={{verticalAlign:-2}}></i></Btn>
                    </>
                  ) : (
                    <>
                      {canEditRow && <Btn variant="gold" onClick={()=>startEdit(p)} style={{marginRight:6}}><PencilIcon /></Btn>}
                      {perms.canDelete && <Btn variant="danger" onClick={()=>remove(p.id)}><TrashIcon /></Btn>}
                    </>
                  )}
                </td>
              </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Variants({ products, variants, setVariants, stock, setStock, perms }) {
  const [productId, setProductId] = useState(""); const [colorCode, setColorCode] = useState("");
  const [seatColor, setSeatColor] = useState(""); const [headrest, setHeadrest] = useState("No");
  const [size, setSize] = useState(""); const [opening, setOpening] = useState(0);
  const [remark, setRemark] = useState("");
  const [q, setQ] = useState("");
  const [selected, setSelected] = useState(() => new Set());
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({});
  const selectedProduct = products.find(p=>p.id===productId);
  const isChair = selectedProduct?.category === "Chair";

  const add = () => {
    if (!perms.canEditVariants || !productId || !colorCode.trim()) return;
    const v = { id:uid(), productId, colorCode:colorCode.trim(), seatColor: isChair?seatColor.trim():"", headrest: isChair?headrest:"No", size:size.trim(), remark:remark.trim() };
    v.sku = makeSku(selectedProduct, v);
    v.shortCode = makeShortCode(selectedProduct, variants);
    setVariants([...variants, v]);
    setStock({ ...stock, [v.id]: { opening:Number(opening)||0, in:0, out:0, blocked:0 } });
    setColorCode(""); setSeatColor(""); setHeadrest("No"); setSize(""); setOpening(0); setRemark("");
  };
  const startEdit = (v, chair) => {
    if (!perms.canEditVariants) return;
    setEditingId(v.id);
    setEditForm({ colorCode:v.colorCode||"", seatColor:v.seatColor||"", headrest:v.headrest||"No", size:v.size||"", remark:v.remark||"", chair });
  };
  const cancelEdit = () => { setEditingId(null); setEditForm({}); };
  const saveEdit = (id) => {
    if (!window.confirm("Save changes to this variant?")) return;

      if (v.id !== id) return v;

        return { ...v, colorCode:(editForm.colorCode||"").trim()||v.colorCode, seatColor: editForm.chair?(editForm.seatColor||"").trim():v.seatColor, headrest: editForm.chair?editForm.headrest:v.headrest, size:(editForm.size||"").trim(), remark:(editForm.remark||"").trim() };
      }
      // warehouse: remark only, everything else stays untouched
      return { ...v, remark:(editForm.remark||"").trim() };
    }));
    setEditingId(null); setEditForm({});
  };
  const remove = (id) => { if (!perms.canDelete) return; if (!window.confirm("Delete this variant? Its stock history will stay, but the variant itself will be removed.")) return; setVariants(variants.filter(v=>v.id!==id)); };
  const toggleSelect = (id) => setSelected(prev => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; });
  const toggleSelectAll = (rows) => setSelected(prev => {
    const allSelected = rows.length>0 && rows.every(v=>prev.has(v.id));
    if (allSelected) return new Set();
    return new Set(rows.map(v=>v.id));
  });
  const bulkRemove = () => {
    if (!perms.canDelete || selected.size===0) return;
    if (!window.confirm(`Delete ${selected.size} selected variant${selected.size===1?"":"s"}? Their stock history will stay, but the variants themselves will be removed.`)) return;
    setVariants(variants.filter(v=>!selected.has(v.id)));
    setSelected(new Set());
  };
  const filtered = variants.filter(v => {

  });

  return (

                <Field label="Seat color"><input style={{width:110}} value={seatColor} onChange={e=>setSeatColor(e.target.value)} placeholder="Black" /></Field>
                <Field label="Headrest"><select style={{width:90}} value={headrest} onChange={e=>setHeadrest(e.target.value)}><option>No</option><option>Yes</option></select></Field>

              <Btn variant="primary" onClick={add}><i className="ti ti-plus" style={{verticalAlign:-2,marginRight:4}}></i>Add variant</Btn>
            </div>

          <div className="card">
            {perms.canDelete && selected.size>0 && (
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 14px", background:C.rustSoft, borderBottom:`1px solid ${C.line}` }}>

                      <td>{editing && perms.isAdmin && chair ? <input style={{width:90,fontSize:12}} value={editForm.seatColor} onChange={e=>setEditForm({...editForm,seatColor:e.target.value})} /> : (chair?(v.seatColor||"—"):"—")}</td>

                        {editing && perms.isAdmin && chair ? (
                          <select style={{width:80,fontSize:12}} value={editForm.headrest} onChange={e=>setEditForm({...editForm,headrest:e.target.value})}><option>No</option><option>Yes</option></select>
                        ) : (chair?(v.headrest==="Yes"?<Badge tone="gold">Yes</Badge>:"No"):"—")}
                      </td>
                      <td>{editing && perms.isAdmin ? <input style={{width:80,fontSize:12}} value={editForm.size} onChange={e=>setEditForm({...editForm,size:e.target.value})} /> : (v.size||"—")}</td>
                      <td>
                        {editing ? (
                          <input style={{width:150, fontSize:12}} value={editForm.remark} onChange={e=>setEditForm({...editForm,remark:e.target.value})} placeholder="e.g. 2 units damaged" autoFocus={!perms.isAdmin} />
                        ) : (v.remark ? <span style={{fontSize:12,color:C.rust}}>{v.remark}</span> : "—")}
                      </td>
                      <td style={{textAlign:"right", whiteSpace:"nowrap"}}>
                        {editing ? (
                          <>
                            <Btn variant="primary" onClick={()=>saveEdit(v.id)} style={{marginRight:6}}><i className="ti ti-check" style={{verticalAlign:-2}}></i></Btn>
                            <Btn variant="ghost" onClick={cancelEdit}><i className="ti ti-x" style={{verticalAlign:-2}}></i></Btn>
                          </>
                        ) : (
                          <>
                            {perms.canEditVariants && <Btn variant="gold" onClick={()=>startEdit(v, chair)} style={{marginRight:6}}><PencilIcon /></Btn>}
                            {perms.canDelete && <Btn variant="danger" onClick={()=>remove(v.id)}><TrashIcon /></Btn>}
                          </>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

function Reports({ movements, variantMap, productMap, products }) {
  const [filterProduct, setFilterProduct] = useState("");
  const [q, setQ] = useState("");
  const [fromDate, setFromDate] = useState("");
  const [toDate, setToDate] = useState("");

  const setPeriod = (kind) => {
    const now = new Date();
    let from = new Date(now);
    if (kind === "day") { /* today only */ }
    else if (kind === "week") { from.setDate(now.getDate() - 6); }
    else if (kind === "month") { from = new Date(now.getFullYear(), now.getMonth(), 1); }
    else if (kind === "year") { from = new Date(now.getFullYear(), 0, 1); }
    else if (kind === "all") { setFromDate(""); setToDate(""); return; }
    setFromDate(from.toISOString().slice(0,10));
    setToDate(now.toISOString().slice(0,10));
  };

  const filtered = movements.filter(m => {
    const v = variantMap[m.variantId];
    if (filterProduct && v?.productId !== filterProduct) return false;
    if (fromDate && m.date < fromDate) return false;
    if (toDate && m.date > toDate) return false;
    const s = q.trim().toLowerCase();
    if (s) {
      const hay = `${v?.shortCode||""} ${productMap[v?.productId]?.name||""} ${m.note||""}`.toLowerCase();
      if (!hay.includes(s)) return false;
    }
    return true;
  });

  const periodIn = filtered.filter(m=>m.type==="in").reduce((s,m)=>s+m.qty,0);
  const periodOut = filtered.filter(m=>m.type==="out").reduce((s,m)=>s+m.qty,0);

  const exportPeriod = () => {
    const rows = filtered.map(m => {
      const v = variantMap[m.variantId];
      return {
        Date: m.date,
        Code: v?.shortCode || "",
        Product: productMap[v?.productId]?.name || "",
        Type: m.type === "in" ? "Inward" : "Outward",
        Quantity: m.qty,
        Note: m.note || "",
        LoggedBy: m.loggedBy || "",
      };
    });
    const label = fromDate || toDate ? `${fromDate||"start"}_to_${toDate||"now"}` : "all-time";
    exportCsv(`stock-movements-${label}.csv`, rows);
  };

  // group by date, newest first
  const byDate = {};
  filtered.forEach(m => { (byDate[m.date] = byDate[m.date] || []).push(m); });
  const dates = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  return (
    <div>
      <SectionHeader eyebrow="Movements" title="Day-by-day inward and outward report" action={<SearchBox value={q} onChange={setQ} placeholder="Search code, product, note…" />} />

      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        <Btn variant="ghost" onClick={()=>setPeriod("day")}>Today</Btn>
        <Btn variant="ghost" onClick={()=>setPeriod("week")}>This week</Btn>
        <Btn variant="ghost" onClick={()=>setPeriod("month")}>This month</Btn>
        <Btn variant="ghost" onClick={()=>setPeriod("year")}>This year</Btn>
        <Btn variant="ghost" onClick={()=>setPeriod("all")}>All time</Btn>
      </div>

      <div style={{ display:"flex", gap:10, marginBottom:20, flexWrap:"wrap", alignItems:"flex-end" }}>
        <Field label="Product">
          <select style={{width:170}} value={filterProduct} onChange={e=>setFilterProduct(e.target.value)}>
            <option value="">All products</option>{products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </Field>
        <Field label="From"><input type="date" style={{width:150}} value={fromDate} onChange={e=>setFromDate(e.target.value)} /></Field>
        <Field label="To"><input type="date" style={{width:150}} value={toDate} onChange={e=>setToDate(e.target.value)} /></Field>
        <Btn variant="primary" onClick={exportPeriod}><i className="ti ti-download" style={{verticalAlign:-2,marginRight:4}}></i>Export CSV</Btn>
      </div>

      <div style={{ display:"flex", gap:14, marginBottom:20 }}>
        <StatCard label="Total inward (period)" value={periodIn} tone="green" />
        <StatCard label="Total outward (period)" value={periodOut} tone="rust" />
        <StatCard label="Net change" value={periodIn-periodOut} tone="teal" />
      </div>

      {dates.length===0 && <div style={{ color:C.sub, fontSize:13 }}>No stock movements match this period.</div>}


      {dates.map(date => {
        const rows = byDate[date];
        const totalIn = rows.filter(r=>r.type==="in").reduce((s,r)=>s+r.qty,0);
        const totalOut = rows.filter(r=>r.type==="out").reduce((s,r)=>s+r.qty,0);
        return (
          <div key={date} className="card" style={{ marginBottom:16 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 16px", background:C.tealSoft }}>
              <div style={{ fontFamily:FONT_DISPLAY, fontWeight:600, fontSize:15, color:C.tealDeep }}>{date}</div>
              <div style={{ display:"flex", gap:8 }}>
                <Badge tone="green">In {totalIn}</Badge>
                <Badge tone="rust">Out {totalOut}</Badge>
              </div>
            </div>
            <table>
              <thead><tr><th>Code</th><th>Product</th><th>Type</th><th style={{textAlign:"right"}}>Qty</th><th>Note</th><th>Logged by</th></tr></thead>
              <tbody>
                {rows.map(m => {
                  const v = variantMap[m.variantId];
                  return (
                    <tr key={m.id} style={{borderTop:`1px solid ${C.line}`}}>
                      <td style={{fontFamily:FONT_MONO,fontSize:12,fontWeight:600}}>{v?.shortCode||"—"}</td>
                      <td>{productMap[v?.productId]?.name||"—"}</td>
                      <td>{m.type==="in" ? <Badge tone="green">Inward</Badge> : <Badge tone="rust">Outward</Badge>}</td>
                      <td style={{textAlign:"right",fontFamily:FONT_MONO}}>{m.qty}</td>
                      <td style={{color:C.sub}}>{m.note||"—"}</td>
                      <td style={{color:C.sub}}>{m.loggedBy}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        );
      })}
    </div>
  );
}

function Orders({ variants, variantMap, productMap, orders, setOrders, stock, setStock, available, perms }) {
  const [customer, setCustomer] = useState(""); const [variantId, setVariantId] = useState("");
  const [qty, setQty] = useState(1); const [error, setError] = useState("");
  const [q, setQ] = useState("");

  const createOrder = () => {
    setError("");
    if (!perms.canManageOrders || !customer.trim() || !variantId || !qty) return;
    const qn = Number(qty); if (qn<=0) return;
    if (available(variantId) < qn) { setError("Not enough available stock to block that quantity."); return; }
    const order = { id:uid(), customer:customer.trim(), date:today(), status:"BLOCKED", items:[{variantId,qty:qn}] };
    setOrders([order, ...orders]);
    setStock({ ...stock, [variantId]: { ...(stock[variantId]||{opening:0,in:0,out:0,blocked:0}), blocked:(stock[variantId]?.blocked||0)+qn } });
    setCustomer(""); setVariantId(""); setQty(1);
  };
  const releaseOrder = (order) => {
    if (!perms.canManageOrders) return;
    setOrders(orders.map(o=>o.id===order.id?{...o,status:"RELEASED"}:o));
    const next = {...stock};
    order.items.forEach(it => { next[it.variantId] = {...(next[it.variantId]||{opening:0,in:0,out:0,blocked:0})}; next[it.variantId].blocked = Math.max(0,(next[it.variantId].blocked||0)-it.qty); });
    setStock(next);
  };
  const confirmOrder = (order) => {
    if (!perms.canManageOrders) return;
    setOrders(orders.map(o=>o.id===order.id?{...o,status:"CONFIRMED"}:o));
    const next = {...stock};
    order.items.forEach(it => { const cur = next[it.variantId]||{opening:0,in:0,out:0,blocked:0}; next[it.variantId] = {...cur, blocked:Math.max(0,(cur.blocked||0)-it.qty), out:(cur.out||0)+it.qty}; });
    setStock(next);
  };
  const toneFor = (s) => s==="BLOCKED"?"gold":s==="CONFIRMED"?"green":s==="RELEASED"?"teal":"rust";
  const filteredOrders = orders.filter(o => {
    const s = q.trim().toLowerCase();
    if (!s) return true;
    const v0 = variantMap[o.items[0].variantId];
    const code = v0?.shortCode || "";
    return o.customer.toLowerCase().includes(s) || code.toLowerCase().includes(s);
  });

  return (
    <div>
      <SectionHeader eyebrow="Fulfilment" title="Orders & stock blocking" action={<SearchBox value={q} onChange={setQ} placeholder="Search customer or code…" />} />
      {perms.canManageOrders && (
        <div style={{ display:"flex", gap:10, marginBottom:10, alignItems:"flex-end", flexWrap:"wrap" }}>
          <Field label="Customer"><input style={{width:180}} value={customer} onChange={e=>setCustomer(e.target.value)} placeholder="Customer name" /></Field>
          <Field label="Variant (Code)">
            <VariantAutocomplete options={variants} productMap={productMap} value={variantId} onChange={setVariantId} placeholder="Type code or color…" width={240} />
          </Field>
          <Field label="Quantity"><input type="number" min="1" style={{width:90}} value={qty} onChange={e=>setQty(e.target.value)} /></Field>
          <Btn variant="gold" onClick={createOrder}><i className="ti ti-lock" style={{verticalAlign:-2,marginRight:4}}></i>Block stock for order</Btn>
        </div>
      )}
      {error && <div style={{color:C.rust,fontSize:12,marginBottom:14}}>{error}</div>}
      <div className="card" style={{marginTop:14}}>
        <table>
          <thead><tr style={{background:C.tealSoft}}><th>Customer</th><th>Code</th><th style={{textAlign:"right"}}>Qty</th><th>Date</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {filteredOrders.length===0 && <tr><td colSpan={6} style={{padding:18,color:C.sub,textAlign:"center"}}>{orders.length===0 ? "No orders yet." : "No orders match your search."}</td></tr>}
            {filteredOrders.map(o => (
              <tr key={o.id} style={{borderTop:`1px solid ${C.line}`, borderLeft: o.status==="BLOCKED"?`3px dashed ${C.gold}`:"3px solid transparent"}}>
                <td>{o.customer}</td>
                <td style={{fontFamily:FONT_MONO,fontSize:12,fontWeight:600}}>{variantMap[o.items[0].variantId]?.shortCode||"—"}</td>
                <td style={{textAlign:"right"}}>{o.items[0].qty}</td>
                <td>{o.date}</td>
                <td><Badge tone={toneFor(o.status)}>{o.status}</Badge></td>
                <td style={{textAlign:"right",display:"flex",gap:6,justifyContent:"flex-end"}}>
                  {o.status==="BLOCKED" && perms.canManageOrders && <>
                    <Btn variant="primary" onClick={()=>confirmOrder(o)}>Confirm sale</Btn>
                    <Btn variant="danger" onClick={()=>releaseOrder(o)}>Release</Btn>
                  </>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Users({ users }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [role, setRole] = useState("sales");
  const [msg, setMsg] = useState("");
  const [busy, setBusy] = useState(false);

  const addUser = async () => {
    setMsg(""); setBusy(true);
    const uname = username.trim().toLowerCase();
    if (!uname || password.length < 6) {
      setMsg("Username required, password needs at least 6 characters.");
      setBusy(false);
      return;
    }
    const fakeEmail = `${uname}@${USER_DOMAIN}`;
    try {
      await secondaryAuth.createUserWithEmailAndPassword(fakeEmail, password);
      await db.collection("users").doc(uname).set({ role });
      await secondaryAuth.signOut();
      setMsg(`${uname} added as ${role}.`);
      setUsername(""); setPassword("");
    } catch (err) {
      setMsg(err.message || "Could not create user.");
    }
    setBusy(false);
  };

  const revoke = async (uname) => {
    if (uname === "admin") { setMsg("Can't revoke the main admin account from here."); return; }
    if (!window.confirm(`Revoke access for "${uname}"? They won't be able to use the app anymore.`)) return;
    await db.collection("users").doc(uname).delete();
  };

  const changeRole = async (uname, newRole) => {
    if (uname === "admin" && newRole !== "admin") {
      setMsg("Can't change the main admin account's role — it must stay Admin.");
      return;
    }
    await db.collection("users").doc(uname).set({ role: newRole });
  };

  return (
    <div>
      <SectionHeader eyebrow="Access" title="Users" />
      <div className="card" style={{ padding:16, marginBottom:20 }}>
        <div style={{ fontSize:12, fontWeight:600, color:C.tealDeep, marginBottom:10, textTransform:"uppercase", letterSpacing:"0.04em" }}>Add a new login</div>
        <div style={{ display:"flex", gap:10, alignItems:"flex-end", flexWrap:"wrap" }}>
          <Field label="Username"><input style={{width:160}} value={username} onChange={e=>setUsername(e.target.value)} placeholder="newuser" /></Field>
          <Field label="Password"><input type="password" style={{width:160}} value={password} onChange={e=>setPassword(e.target.value)} placeholder="at least 6 characters" /></Field>
          <Field label="Role">
            <select style={{width:150}} value={role} onChange={e=>setRole(e.target.value)}>
              <option value="admin">Admin</option><option value="warehouse">Warehouse manager</option><option value="sales">Sales (view only)</option>
            </select>
          </Field>
          <Btn variant="primary" disabled={busy} onClick={addUser}><i className="ti ti-plus" style={{verticalAlign:-2,marginRight:4}}></i>Add user</Btn>
        </div>
        {msg && <div style={{ fontSize:12, color: msg.includes("added") ? C.green : C.rust, marginTop:10 }}>{msg}</div>}
      </div>

      <div className="card">
        <table>
          <thead><tr style={{background:C.tealSoft}}><th>Username</th><th>Role</th><th></th></tr></thead>
          <tbody>
            {Object.entries(users).map(([uname, r]) => (
              <tr key={uname} style={{borderTop:`1px solid ${C.line}`}}>
                <td>{uname}</td>
                <td>
                  <select value={r} onChange={e=>changeRole(uname, e.target.value)} style={{ padding:"5px 8px" }}>
                    <option value="admin">Admin</option><option value="warehouse">Warehouse manager</option><option value="sales">Sales (view only)</option>
                  </select>
                </td>
                <td style={{textAlign:"right"}}><Btn variant="danger" onClick={()=>revoke(uname)}>Revoke access</Btn></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {msg && msg.includes("main admin") && <div style={{ fontSize:12, color:C.rust, marginTop:10 }}>{msg}</div>}
      <div style={{fontSize:12,color:C.sub,marginTop:10}}>Revoking access removes their app permissions immediately. Their login still technically exists in Firebase Authentication — delete it there too if you want it fully gone.</div>
    </div>
  );
}

/* ---------- Root: auth gate ---------- */
async function ensureSeeded() {
  try {
    const snap = await db.collection("users").get();
    if (snap.empty) {
      const batch = db.batch();
      Object.entries(SEED_ROLE_MAP).forEach(([username, role]) => {
        batch.set(db.collection("users").doc(username), { role });
      });
      await batch.commit();
    }
  } catch (err) {
    console.error("Failed to check/seed users:", err);
    reportSyncError("Couldn't reach the database — check your connection.");
  }
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("Spica Stock Manager crashed:", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#FAF7F0", padding:24 }}>
          <div className="card" style={{ maxWidth:420, padding:28, textAlign:"center" }}>
            <div style={{ fontSize:32, marginBottom:10 }}>⚠️</div>
            <div style={{ fontFamily:FONT_DISPLAY, fontSize:18, fontWeight:600, color:C.tealDeep, marginBottom:8 }}>Something went wrong</div>
            <div style={{ fontSize:13, color:C.sub, marginBottom:18 }}>The app hit an unexpected error. Your data is safe in the database — reloading usually fixes this.</div>
            <Btn variant="primary" onClick={()=>window.location.reload()}>Reload app</Btn>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function OfflineBanner() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const goOnline = () => setOnline(true);
    const goOffline = () => setOnline(false);
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    return () => { window.removeEventListener("online", goOnline); window.removeEventListener("offline", goOffline); };
  }, []);
  if (online) return null;
  return (
    <div style={{ background:"#8B1E12", color:"#fff", textAlign:"center", padding:"8px 14px", fontSize:12, fontWeight:600, position:"sticky", top:0, zIndex:200 }}>
      <i className="ti ti-wifi-off" style={{ verticalAlign:-2, marginRight:6 }}></i>
      No internet connection — changes won't be saved until you're back online.
    </div>
  );
}

function SyncErrorBanner() {
  const [msg, setMsg] = useState(null);
  useEffect(() => {
    const handler = (e) => {
      setMsg(e.detail);
      clearTimeout(handler._t);
      handler._t = setTimeout(() => setMsg(null), 8000);
    };
    window.addEventListener("spica-sync-error", handler);
    return () => window.removeEventListener("spica-sync-error", handler);
  }, []);
  if (!msg) return null;
  return (
    <div style={{ background:C.gold, color:"#3B2E08", textAlign:"center", padding:"8px 14px", fontSize:12, fontWeight:600, position:"sticky", top:0, zIndex:199 }}>
      <i className="ti ti-alert-triangle" style={{ verticalAlign:-2, marginRight:6 }}></i>{msg}
    </div>
  );
}

function Root() {
  const [user, setUser] = useState(undefined); // undefined = loading, null = signed out
  const [role, setRole] = useState(undefined);
  const [username, setUsername] = useState("");

  useEffect(() => auth.onAuthStateChanged((u) => {
    setUser(u);
    if (!u) { setRole(undefined); return; }
    const uname = (u.email || "").split("@")[0];
    setUsername(uname);
    let unsub = () => {};
    ensureSeeded().finally(() => {
      unsub = db.collection("users").doc(uname).onSnapshot((snap) => {
        setRole(snap.exists ? snap.data().role : null);
      });
    });
    return () => unsub();
  }), []);

  if (user === undefined) return <div style={{padding:40}}>Loading…</div>;
  if (user === null) return <Login />;
  if (role === undefined) return <div style={{padding:40}}>Loading…</div>;
  if (!role) {
    return (
      <div style={{ padding:40 }}>
        <p>Your account ({username}) isn't assigned a role yet. Ask the admin to add you from the Users tab.</p>
        <Btn onClick={()=>auth.signOut()}>Sign out</Btn>
      </div>
    );
  }
  return <App username={username} role={role} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary>
    <OfflineBanner />
    <SyncErrorBanner />
    <Root />
  </ErrorBoundary>
);
</script>
</body>
</html>
