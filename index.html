<style>
  :root {
    --bg:#FAF7F0; --surface:#FFFFFF; --ink:#221F1A; --sub:#6B6459;
    --teal:#0F3D3E; --tealDeep:#0A2B2C; --gold:#B8912E; --goldSoft:#F1E4C2;
    --tealSoft:#E1EEEC; --rust:#B3492B; --rustSoft:#F6E2DA; --green:#3F6B3F;
    --greenSoft:#E4EEE0; --line:#E4DFD3;

  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:'Inter',system-ui,sans-serif; }

    padding:8px 10px; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--ink); outline:none;

  .label { font-size:11px; font-weight:600; color:var(--sub); text-transform:uppercase; letter-spacing:.04em; }

  .app-shell { display:flex; min-height:100vh; }
  .sidebar { width:220px; background:var(--teal); padding:24px 14px; display:flex; flex-direction:column; gap:4px; flex-shrink:0; }
  .main-content { flex:1; padding:28px 32px; min-width:0; max-width:100%; }

  .nav-overlay { display:none; }

  @media (max-width: 860px) {
    .mobile-topbar {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--teal); padding:12px 16px; position:sticky; top:0; z-index:60;
    }
    .app-shell { flex-direction:column; }
    .sidebar { display:none; }
    .sidebar.mobile-open {
      display:flex; position:fixed; top:0; left:0; bottom:0; width:78vw; max-width:280px;
      z-index:80; overflow-y:auto; box-shadow:4px 0 24px rgba(0,0,0,0.25);

function exportCsv(filename, rows) {
  if (!rows.length) return;
  const headers = Object.keys(rows[0]);
  const escape = v => `"${String(v ?? "").replace(/"/g, '""')}"`;
  const csv = [headers.join(","), ...rows.map(r => headers.map(h => escape(r[h])).join(","))].join("\n");
  const blob = new Blob([csv], {
    type: "text/csv;charset=utf-8;"
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function makeSku(product, v) {
  const p = (product?.code || "GEN").toUpperCase();
  const c = (v.colorCode || "NA").toUpperCase();
  const isChair = product?.category === "Chair";
  const s = isChair ? (v.seatColor || "").toUpperCase() : "";
  const h = isChair ? v.headrest === "Yes" ? "HR" : "NH" : "";
  const sz = (v.size || "STD").toUpperCase();
  return [p, c, s, h, sz].filter(Boolean).join("-");
}

// Short, easy-to-read identifier: PRODUCTCODE-01, PRODUCTCODE-02, ...
// Numbered per product, so it stays short even though the full SKU (with
// color/seat/headrest/size) can get long. The full SKU is still kept as the
// detailed reference alongside it.
function makeShortCode(product, existingVariants) {
  const p = (product?.code || "GEN").toUpperCase();
  const countForProduct = existingVariants.filter(v => v.productId === product?.id).length;
  const n = countForProduct + 1;
  const padded = n < 100 ? String(n).padStart(2, "0") : String(n);
  return `${p}-${padded}`;
}

const DOC = name => db.collection("spica_stock").doc(name);
// Shared, lightweight way for any part of the app to report a sync problem —
// the OfflineBanner-adjacent SyncErrorBanner listens for this.
function reportSyncError(message) {
  window.dispatchEvent(new CustomEvent("spica-sync-error", {
    detail: message
  }));
}
function useSyncedDoc(name, fallback) {
  const [value, setValue] = useState(fallback);
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const unsub = DOC(name).onSnapshot(snap => {
      setValue(snap.exists ? snap.data().payload : fallback);
      setReady(true);
    }, err => {
      console.error(`Failed to load "${name}":`, err);
      reportSyncError(`Couldn't load ${name} — check your connection and refresh.`);
    });
    return unsub;
  }, [name]);
  const save = useCallback(next => {
    setValue(next);
    DOC(name).set({
      payload: next
    }).catch(err => {
      console.error(`Failed to save "${name}":`, err);
      reportSyncError(`Couldn't save your last change to ${name} — check your connection.`);
    });
  }, [name]);
  return [value, save, ready];
}

/* Users collection: one Firestore doc per username, holding { role } */
function useUsers() {
  const [users, setUsers] = useState({});
  const [ready, setReady] = useState(false);
  useEffect(() => {
    const unsub = db.collection("users").onSnapshot(async snap => {
      if (snap.empty) {
        // first ever run — seed the 3 known accounts so login keeps working
        const batch = db.batch();
        Object.entries(SEED_ROLE_MAP).forEach(([username, role]) => {
          batch.set(db.collection("users").doc(username), {
            role
          });
        });
        try {
          await batch.commit();
        } catch (err) {
          console.error("Failed to seed users:", err);
          reportSyncError("Couldn't set up default accounts — check your connection.");
        }
        return;
      }
      const map = {};
      snap.forEach(d => {
        map[d.id] = d.data().role;
      });
      setUsers(map);
      setReady(true);
    }, err => {
      console.error("Failed to load users:", err);
      reportSyncError("Couldn't load user list — check your connection.");
    });
    return unsub;
  }, []);
  return [users, ready];
}
